name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to a full commit SHA for supply-chain safety; Dependabot
      # keeps the SHA + the version comment up to date.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      # No committed lockfile (see .gitignore) so Cloudflare's GitHub build stays
      # green; install matches that environment.
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # NOTE: e2e (Playwright) is a local-only suite — it drives real face/text
      # detection against private fixtures in public/test/, which are gitignored
      # and never pushed. Run it locally with `npm run e2e`.
